le_ja": "どちらもACプラグ内蔵型・出張向けで直接競合。CIOは10000mAh・67W・10800円、Ankerは9600mAh・65W・GaN採用で競合。", "confidence": "high", "sources": ["https://03review.com/mobile-battery-plug/"]}, {"from": "prod_anker_prime_250w", "to": "reg_airline_100wh", "type": "limited_by", "rationale_ja": "102.3Wh＝100Wh超のため航空機では事前承認が必要になり、旅行ユーザーから『出張に使えない』と評価が下がる非対称ペナルティ（insight_1の核心）", "confidence": "high", "sources": ["https://www.mlit.go.jp/report/press/content/001995959.pdf"]}], "insights": [{"id": "insight_1", "title_ja": "「100Wh境界線」が製品設計の隠れた最重要パラメータになっている", "title_en": "The '100Wh Boundary' Has Become the Hidden Critical Design Parameter", "body_ja": "Zendure SuperTank Pro（99.1Wh）・Anker Prime 300W（99.75Wh）・Anker Prime 250W（102.3Wh）を並べると、各社が「100Wh以下ギリギリ」に容量を設計していることが浮かび上がる。100Wh以下なら航空機持込時の事前承認が不要になるため、大容量と航空機フリーパスを両立する「設計上の最適解」がこの境界線に集中している。逆に100Whを超えた製品（Anker Prime 250W）は旅行ユーザーから「出張に使えない」と評価が下がるという非対称なペナルティが存在する。2027年以降IATAが100Wh制限を厳格化する可能性があり、現在100〜160Wh帯に設計された製品は市場から淘汰されるリスクがある。", "body_en": "Placing Zendure SuperTank Pro (99.1Wh), Anker Prime 300W (99.75Wh), and Anker Prime 250W (102.3Wh) side by side reveals that manufacturers are deliberately designing capacity to just under 100Wh. Below this threshold, no pre-approval is required for airline carry-on, making it the optimal design sweet spot for maximizing capacity while maintaining airline-friendly status. Products exceeding 100Wh (like Anker Prime 250W) face asymmetric penalties from travel users. IATA may tighten restrictions to 100Wh by 2027, potentially eliminating the 100-160Wh segment.", "affected_nodes": ["prod_anker_prime_300w", "prod_zendure_supertank_pro", "prod_anker_prime_250w", "reg_airline_160wh", "reg_lithium_transport"], "sources": ["https://www.theverge.com/news/765778/anker-fastest-power-bank-launches-new-prime-family", "https://chibimegane.jp/zendure-supertank-pro-spec/", "https://www.jal.co.jp/jp/ja/info/2026/other/260330/"]}, {"id": "insight_2", "title_ja": "「コンセント一体型」は出張ビジネスパーソンとシニアという一見無関係な2層を同時に解決する", "title_en": "Built-in AC Plug Simultaneously Solves Two Seemingly Unrelated Segments: Business Travelers and Seniors", "body_ja": "CIO SMARTCOBY PLUG IIやAnker Prime Fusionが採用するACプラグ内蔵技術は、表面上は「荷物削減」という出張ビジネスパーソンのニーズに応えているが、実は「充電器とバッテリーを別々に管理しなくていい」という認知負荷の低減がシニア・デジタル初心者にも刺さる。出張族は「USB充電器を忘れた」という体験から、シニアは「どのケーブルをどこに挿すかわからない」という体験から、同じ製品に辿り着く。ただし両層のニーズは「価格感度」「ブランド認知」「購買チャネル」が全く異なるため、マーケティングは分離が必要。", "body_en": "The built-in AC plug technology in CIO SMARTCOBY PLUG II and Anker Prime Fusion ostensibly addresses business travelers' need to reduce luggage, but it also reduces cognitive load for seniors and digital beginners who struggle with 'which cable goes where.' Both segments arrive at the same product from entirely different pain points. However, their price sensitivity, brand awareness, and purchase channels differ significantly, requiring separate marketing strategies.", "affected_nodes": ["tech_ac_plug", "seg_business_traveler", "seg_senior", "prod_cio_smartcoby_plug2", "prod_anker_prime_fusion_65w"], "sources": ["https://03review.com/mobile-battery-plug/", "https://www.yamada-denkiweb.com/media/21909/"]}, {"id": "insight_3", "title_ja": "Qi2/MagSafeは『iPhone専用ガジェット』ではなく、ユーザー層横断の『ケーブルレス体験』インフラになりつつある", "title_en": "Qi2/MagSafe Is Becoming a Cross-Segment 'Cable-Free Experience' Infrastructure, Not Just an iPhone Gadget", "body_ja": "Anker MagGo・CIO SMARTCOBY SLIM Wireless・UGREEN MagFlow・EcoFlow RAPIDという異なるブランドが2024〜2025年にQi2対応製品を一斉投入した事実は、Qi2が単なる『iPhone向けオプション機能』から『モバイルバッテリーの標準インターフェース』へ移行しつつあることを示す。注目すべきは、Qi2の恩恵を受けるユーザー層が通勤ユーザー（ケーブル不要で歩きながら充電）・ガジェット好き（最新規格）・ライブファン（バッグに入れたまま充電）と全く異なる動機で重なっている点だ。ただし、Qi2.2（25W）への対応はまだ一部製品のみで、AndroidエコシステムのQi2普及率が低いため、現時点ではiPhone 12以降ユーザーに限定される。PSE規制との関係では、ワイヤレス充電機能を持つ製品は電波法・電気用品安全法の両方への適合が必要になる複雑さもある。", "body_en": "The simultaneous launch of Qi2-compatible products by Anker MagGo, CIO SMARTCOBY SLIM Wireless, UGREEN MagFlow, and EcoFlow RAPID in 2024-2025 signals Qi2's transition from an 'iPhone optional feature' to a 'standard mobile battery interface.' Notably, Qi2 benefits overlap across completely different user segments: commuters (charge while walking without cables), gadget enthusiasts (latest standard), and live fans (charge inside bag). However, Qi2.2 (25W) adoption is still limited to select products, and low Qi2 penetration in the Android ecosystem currently restricts benefits to iPhone 12+ users.", "affected_nodes": ["tech_qi2_magsafe", "prod_anker_maggo_10k", "prod_cio_smartcoby_slim_wireless", "prod_ugreen_magflow_10k", "prod_ecoflow_rapid_mag_10k", "seg_commuter", "seg_gadget_enthusiast", "seg_live_fan"], "sources": ["https://my-best.com/959", "https://makuring.jp/best-power-bank/", "https://www.silicon-power.com/jp/knowledge-detail/magsafe/"]}]};

  {id:'disp',g:'funcG',ja:'残量表示',en:'Battery readout',pred:p=>p.attrs.display!=null&&p.attrs.display!==false},
  {id:'new',g:'funcG',ja:'2025年〜 新製品',en:'2025+ new',pred:p=>num(p.attrs.release_year)>=2025},
  {id:'pt',g:'funcG',ja:'パススルー',en:'Pass-through',pred:p=>/パススルー|pass.?through/i.test((p.attrs.note||'')+' '+JSON.stringify(p.attrs))},
  {id:'wh100',g:'funcG',ja:'⚡ 100Wh級(航空機の壁)',en:'⚡ ~100Wh (airline wall)',pred:INSIGHT_SET.insight_1}
];
// 機能的特徴 → 対応する洞察ストーリー（選択時にⓘ詳しくで物語を出す）
const FEAT_INSIGHT={wh100:'insight_1',ac:'insight_2',wl:'insight_3'};
const featById={}; FEATURES.forEach(f=>featById[f.id]=f);

function themeSet(key){
  if(segProducts[key]) return segProducts[key];
  if(INSIGHT_SET[key]){ const s=new Set(); products.forEach(p=>{if(INSIGHT_SET[key](p))s.add(p.id);}); return s; }
  return new Set();
}
function computeResult(){
  let r=products.slice();
  if(brandSel!=='All') r=r.filter(p=>prodBrand[p.id]===brandSel);
  if(themeSel!=='All'){const s=themeSet(themeSel); r=r.filter(p=>s.has(p.id));}
  if(featSel!=='All') r=r.filter(p=>featById[featSel].pred(p));
  return r.map(p=>p.id);
}
function anyFilter(){return !(brandSel==='All'&&themeSel==='All'&&featSel==='All');}

function nodeColor(t){return TYPE_COLOR[t]||'#888';}
function hexA(hex,a){if(a>=1)return hex;const m=hex.replace('#','');return `rgba(${parseInt(m.slice(0,2),16)},${parseInt(m.slice(2,4),16)},${parseInt(m.slice(4,6),16)},${a})`;}
function edgeBase(t){const b=EDGE_STYLE[t]||{color:'#444b66',width:1};return {color:b.color||'#444b66',width:b.width||1,dashes:b.dashes||false};}

function buildNodes(){
  const fs=filterIds?new Set(filterIds):null;
  return KG.nodes.map(n=>{
    const dim=fs&&!fs.has(n.id);
    const hot=fs&&fs.has(n.id);
    return {id:n.id,label:(LANG==='ja'?n.label_ja:n.label_en)||n.label_ja,
      color:{background:dim?'#262c44':nodeColor(n.type),border:dim?'#262c44':nodeColor(n.type),highlight:{background:'#fff',border:nodeColor(n.type)}},
      size:hot?TYPE_SIZE[n.type]+8:TYPE_SIZE[n.type],shape:'dot',
      font:{color:dim?'rgba(150,160,180,.10)':'#dfe3ee',size:hot?15:13,face:'Inter, Noto Sans JP',strokeWidth:3,strokeColor:'#14172a'}};
  });
}
function buildEdges(){
  const fs=filterIds?new Set(filterIds):null;
  return KG.edges.map((e,i)=>{
    const s=edgeBase(e.type),meaning=MEANING.has(e.type); let w=s.width,a=1;
    if(LENS){if(!meaning){a=.07;w=.6;}else w+=.8;}
    if(fs){const touch=fs.has(e.from)||fs.has(e.to); if(!touch)a=Math.min(a,.05); else w+=.6;}
    return {id:'e'+i,from:e.from,to:e.to,_idx:i,color:{color:hexA(s.color,a),highlight:s.color,hover:s.color},
      width:w,dashes:s.dashes,smooth:{type:'continuous',roundness:.2},
      arrows:{to:{enabled:e.type!=='competes_with',scaleFactor:.4}},title:KG.edges[i].rationale_ja||undefined};
  });
}

const nodes=new vis.DataSet(buildNodes());
const edges=new vis.DataSet(buildEdges());
// Anker実証レシピ: DEFAULT(収束)とPULSE(バネ感)の二段。focus/選択時にPULSE再励起→周りがゆら！
// Anker忠実レシピ: 弱い長距離反発＋強い重なり回避＋centralGravityで結束＝飛ばない＆局所うにうに
const DEFAULT_PHYSICS={barnesHut:{gravitationalConstant:-2400,centralGravity:.06,springLength:125,springConstant:.03,damping:.5,avoidOverlap:.6},minVelocity:.01,timestep:.4,stabilization:{iterations:200,fit:true}};
const PULSE_PHYSICS={barnesHut:{gravitationalConstant:-2800,centralGravity:.2,springLength:125,springConstant:.05,damping:.42,avoidOverlap:.45},minVelocity:.01,timestep:.4,stabilization:false};
const network=new vis.Network(document.getElementById('net'),{nodes,edges},{
  physics:DEFAULT_PHYSICS,
  interaction:{hover:true,tooltipDelay:120},nodes:{borderWidth:2}});
let pulseTimer=null;
function pulse(){
  network.setOptions({physics:{enabled:true,...PULSE_PHYSICS}});
  network.startSimulation();
  if(pulseTimer)clearTimeout(pulseTimer);
  pulseTimer=setTimeout(()=>network.setOptions({physics:{enabled:true,...DEFAULT_PHYSICS,stabilization:false}}),1400);
}

function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function fmtVal(k,v){if(v===true)return LANG==='ja'?'✓ あり':'✓ Yes';if(v===false)return LANG==='ja'?'— なし':'— No';
  if(v===null||v==='')return '—';if(Array.isArray(v))return v.map(esc).join('、');if(k==='price_jpy')return '¥'+Number(v).toLocaleString();return esc(v);}
function klabel(k){return (KEY_LABEL[LANG]&&KEY_LABEL[LANG][k])||k;}
// Amazonアソシエイト（tag=davetanaka-22）。全23製品リンク化
const AFF_TAG='davetanaka-22';
const AFFILIATE={"prod_anker_maggo_10k":"B0DB17C63X","prod_anker_nano_30w":"B0CDBY9P5Q","prod_ugreen_nexode_25k_200w":"B0CXHM5RY2","prod_anker_prime_300w":"B0FKN98246","prod_anker_prime_250w":"B0BZ3D6GGH","prod_anker_prime_220w":"B0FKNC153X","prod_anker_prime_fusion_65w":"B0D7D8JP6Q","prod_anker_pb_10k_22w":"B0CQMSZBXZ","prod_anker_fusion_30w":"B0CL8S3WMX","prod_cio_smartcoby_trio":"B0GMWZ9MWK","prod_cio_smartcoby_plug2":"B0DG51V4G3","prod_ugreen_magflow_10k":"B0F6NC41DZ","prod_zendure_supertank_pro":"B09D76H8J7","prod_xiaomi_212w_25k":"B0DKFWMBT6","prod_baseus_blade_100w":"B0CNT2KBBH","prod_anker_pb_25k_100w":"B0DT4RGDSJ","prod_anker_zolo_10k":"B0FF42H4QX","prod_ugreen_strap_20k":"B0D9GQMMSV","prod_anker_maggo_applewatch":"B0D9BBHD6M","prod_cio_smartcoby_slim_wireless":"B0FTYZXTMK","prod_belkin_boostcharge_20k":"B0F4VMBBST","prod_ecoflow_rapid_mag_10k":"B0G7FJF7VJ","prod_elecom_de_c64_20k":"B0FCMDX72M"};
function affUrl(id){const a=AFFILIATE[id];return a?`https://www.amazon.co.jp/dp/${a}?tag=${AFF_TAG}`:null;}
function showNode(n){
  pulse();
  const p=document.getElementById('panel'),c=nodeColor(n.type),aff=affUrl(n.id);let kv='';
  Object.entries(n.attrs||{}).forEach(([k,v])=>{if(v===undefined)return;
    let vv=fmtVal(k,v);
    if(k==='price_jpy'&&aff&&v!=null&&v!=='')vv=`<a href="${aff}" target="_blank" rel="sponsored noopener" style="color:#e9c46a;text-decoration:underline">${vv}</a>`;
    kv+=`<div class="k">${esc(klabel(k))}</div><div class="v">${vv}</div>`;});
  let src='';if(n.sources&&n.sources.length)src='<div class="srch">'+(LANG==='ja'?'出典':'Sources')+'</div><div class="src">'+n.sources.map(u=>`<a href="${esc(u)}" target="_blank" rel="noopener">${esc(u.replace(/^https?:\/\//,''))}</a>`).join('')+'</div>';
  const title=esc(LANG==='ja'?n.label_ja:n.label_en);
  const titleHtml=aff?`<a href="${aff}" target="_blank" rel="sponsored noopener" style="color:#fff;text-decoration:none">${title} <span style="color:#4361ee;font-size:12px">↗</span></a>`:title;
  const cta=aff?`<a href="${aff}" target="_blank" rel="sponsored noopener" style="display:inline-flex;align-items:center;gap:5px;margin:0 0 12px;background:#febd69;color:#1a1208;font-weight:700;font-size:12.5px;padding:7px 12px;border-radius:8px;text-decoration:none">🛒 ${LANG==='ja'?'Amazonで見る':'View on Amazon'} ↗</a>`:'';
  p.innerHTML=`<span class="x" onclick="hidePanel()">×</span><span class="badge" style="background:${c}">${esc(TYPE_LABEL[LANG][n.type]||n.type)}</span>`+
    `<h3>${titleHtml}</h3><div class="sub2">${esc(LANG==='ja'?(n.label_en||''):(n.label_ja||''))}</div>`+(kv?`<div class="kv">${kv}</div>`:'')+cta+src;
  p.classList.add('show');
}
function showEdge(e){const r=KG.edges[e._idx];if(!r)return;const p=document.getElementById('panel'),a=idToNode[r.from],b=idToNode[r.to];
  const lbl=(EDGE_LABEL[LANG]&&EDGE_LABEL[LANG][r.type])||r.type;let src='';
  if(r.sources&&r.sources.length)src='<div class="srch">'+(LANG==='ja'?'出典':'Sources')+'</div><div class="src">'+r.sources.map(u=>`<a href="${esc(u)}" target="_blank" rel="noopener">${esc(u.replace(/^https?:\/\//,''))}</a>`).join('')+'</div>';
  p.innerHTML=`<span class="x" onclick="hidePanel()">×</span><span class="badge" style="background:${MEANING.has(r.type)?'#2a9d8f':'#6b7280'}">${esc(lbl)}${r.confidence?' · '+esc(r.confidence):''}</span>`+
    `<h3 style="font-size:14px">${esc(LANG==='ja'?a.label_ja:a.label_en)} <span style="color:#6b7280">→</span> ${esc(LANG==='ja'?b.label_ja:b.label_en)}</h3>`+(r.rationale_ja?`<div class="rat" style="margin-top:10px">${esc(r.rationale_ja)}</div>`:'')+src;
  p.classList.add('show');
}
function hidePanel(){document.getElementById('panel').classList.remove('show');}
window.hidePanel=hidePanel;
network.on('click',p=>{stopAuto();if(p.nodes.length)showNode(idToNode[p.nodes[0]]);else if(p.edges.length)showEdge(edges.get(p.edges[0]));else hidePanel();});

/* ---- selects ---- */
function opt(v,label,sel){return `<option value="${v}"${v===sel?' selected':''}>${esc(label)}</option>`;}
function fillSelects(){
  const u=UI[LANG];
  document.getElementById('sel-brand').innerHTML=opt('All',u.all,brandSel)+brands.map(b=>opt(b.id,LANG==='ja'?b.label_ja:b.label_en,brandSel)).join('');
  let th=opt('All',u.all,themeSel);
  th+=`<optgroup label="${esc(u.segG)}">`+segments.map(s=>opt(s.id,LANG==='ja'?s.label_ja:s.label_en,themeSel)).join('')+`</optgroup>`;
  document.getElementById('sel-theme').innerHTML=th;
  const groups={funcG:[],capG:[],priceG:[]};
  FEATURES.forEach(f=>groups[f.g].push(f));
  let ft=opt('All',u.all,featSel);
  ['funcG','capG','priceG'].forEach(g=>{ft+=`<optgroup label="${esc(u[g])}">`+groups[g].map(f=>opt(f.id,LANG==='ja'?f.ja:f.en,featSel)).join('')+`</optgroup>`;});
  document.getElementById('sel-feat').innerHTML=ft;
}
document.getElementById('sel-brand').onchange=e=>{brandSel=e.target.value;refresh(true);};
document.getElementById('sel-theme').onchange=e=>{themeSel=e.target.value;refresh(true);};
document.getElementById('sel-feat').onchange=e=>{featSel=e.target.value;refresh(true);};
document.getElementById('clr').onclick=()=>{brandSel=themeSel=featSel='All';fillSelects();refresh(false);};

/* ---- breadcrumb ---- */
function crumbLabel(kind,val){
  if(kind==='brand')return idToNode[val]?(LANG==='ja'?idToNode[val].label_ja:idToNode[val].label_en):val;
  if(kind==='theme'){if(idToNode[val])return LANG==='ja'?idToNode[val].label_ja:idToNode[val].label_en;return INSIGHT_SHORT[LANG][val]||val;}
  if(kind==='feat')return LANG==='ja'?featById[val].ja:featById[val].en;
}
function renderCrumb(count){
  const c=document.getElementById('crumb'),u=UI[LANG];
  if(!anyFilter()){c.classList.remove('show');c.innerHTML='';return;}
  let h='';const parts=[];
  if(brandSel!=='All')parts.push(['brand',brandSel]);
  if(themeSel!=='All')parts.push(['theme',themeSel]);
  if(featSel!=='All')parts.push(['feat',featSel]);
  parts.forEach((p,i)=>{if(i)h+=`<span class="op">×</span>`;
    h+=`<span class="cc">${esc(crumbLabel(p[0],p[1]))}<span class="x" data-k="${p[0]}">✕</span></span>`;});
  h+=count>0?`<span class="cnt">${count} ${esc(u.products)}</span>`:`<span class="cnt zero">${esc(u.zero)}</span>`;
  c.innerHTML=h;c.classList.add('show');
  c.querySelectorAll('.x').forEach(x=>x.onclick=()=>{const k=x.dataset.k;if(k==='brand')brandSel='All';if(k==='theme')themeSel='All';if(k==='feat')featSel='All';fillSelects();refresh(true);});
}

/* ---- stepper ---- */
function setupStepper(){
  const el=document.getElementById('step');
  if(!filterIds||!filterIds.length){el.classList.remove('show');stopAuto();renderInsightBox();return;}
  el.classList.add('show');stepIdx=Math.min(stepIdx,filterIds.length-1);updateStep(false);renderInsightBox();
}
function updateStep(focus){
  if(!filterIds||!filterIds.length)return;
  if(stepIdx<0)stepIdx=filterIds.length-1;if(stepIdx>=filterIds.length)stepIdx=0;
  const id=filterIds[stepIdx],n=idToNode[id];
  document.getElementById('step-now').textContent=(LANG==='ja'?n.label_ja:n.label_en);
  document.getElementById('step-c').textContent=(stepIdx+1)+' / '+filterIds.length;
  if(focus){network.focus(id,{scale:1.05,animation:{duration:550},offset:{x:-130,y:0}});showNode(n);}
}
document.getElementById('step-prev').onclick=()=>{stopAuto();stepIdx--;updateStep(true);};
document.getElementById('step-next').onclick=()=>{stopAuto();stepIdx++;updateStep(true);};
document.getElementById('step-auto').onclick=()=>{ if(autoTimer)stopAuto(); else startAuto(); };
function startAuto(){const b=document.getElementById('step-auto');b.classList.add('on');b.textContent='⏸';
  autoTimer=setInterval(()=>{stepIdx++;updateStep(true);},3600);updateStep(true);}
function stopAuto(){if(autoTimer){clearInterval(autoTimer);autoTimer=null;}const b=document.getElementById('step-auto');if(b){b.classList.remove('on');b.textContent='▶';}}

/* ---- insight box (folded into theme) ---- */
function renderInsightBox(){
  const box=document.getElementById('ins');
  const ins=(KG.insights||[]).find(o=>o.id===FEAT_INSIGHT[featSel]);
  if(!ins){box.classList.remove('show','open');return;}
  box.classList.add('show');
  document.getElementById('ins-t').textContent=LANG==='ja'?(ins.title_ja||ins.title):(ins.title_en||ins.title_ja);
  document.getElementById('ins-b').textContent=LANG==='ja'?(ins.body_ja||''):(ins.body_en||ins.body_ja||'');
  document.getElementById('ins-more').textContent=UI[LANG].more;
}
document.getElementById('ins-more').onclick=()=>{const b=document.getElementById('ins');b.classList.toggle('open');
  document.getElementById('ins-more').textContent=b.classList.contains('open')?UI[LANG].less:UI[LANG].more;};

/* ---- refresh (recompute + repaint) ---- */
function refresh(fit){
  filterIds=anyFilter()?computeResult():null;
  if(!filterIds||!filterIds.length)stepIdx=0;
  nodes.update(buildNodes());edges.update(buildEdges());
  renderCrumb(filterIds?filterIds.length:0);
  setupStepper();
  pulse();
  if(fit&&filterIds&&filterIds.length)network.fit({nodes:filterIds,animation:{duration:650}});
  if(fit&&!anyFilter())network.fit({animation:{duration:650}});
}

/* ---- legend / lang / lens ---- */
function renderLegend(){document.getElementById('leg-row').innerHTML=Object.keys(TYPE_COLOR).map(t=>`<div class="it"><span class="dot" style="background:${TYPE_COLOR[t]}"></span>${esc(TYPE_LABEL[LANG][t])}</div>`).join('');}
function setLang(l){LANG=l;document.querySelectorAll('#lang span').forEach(s=>s.classList.toggle('on',s.dataset.l===l));document.documentElement.lang=l;
  const u=UI[l];document.getElementById('t-title').textContent=u.title;document.getElementById('t-sub').textContent=u.sub;
  document.getElementById('t-lens').textContent=u.lens;document.getElementById('t-leg').textContent=u.leg;
  document.getElementById('t-navh').textContent=u.navh;document.getElementById('t-lb').textContent=u.lb;
  document.getElementById('t-lt').textContent=u.lt;document.getElementById('t-lf').textContent=u.lf;document.getElementById('t-clr').textContent=u.clr;
  document.getElementById('t-foot').innerHTML=u.foot;
  fillSelects();nodes.update(buildNodes());renderLegend();renderCrumb(filterIds?filterIds.length:0);setupStepper();}
document.querySelectorAll('#lang span').forEach(s=>s.onclick=()=>setLang(s.dataset.l));
document.getElementById('lens').onclick=()=>{LENS=!LENS;document.getElementById('lens').classList.toggle('on',LENS);edges.update(buildEdges());};

fillSelects();renderLegend();setLang('ja');
// うにうに継続：停止しかけたら再励起（Anker式パルス）＝止まらない
setTimeout(()=>network.fit({animation:{duration:700}}),1100);
// 永続うにうに：定期的に数ノードを微小に揺らして物理を生かし続ける（Anker的に止まらない）
setInterval(()=>{
  if(document.hidden)return;
  const ids=nodes.getIds(),pos=network.getPositions();const upd=[];
  for(let k=0;k<5;k++){const id=ids[Math.floor(Math.random()*ids.length)];if(!pos[id])continue;
    upd.push({id,x:pos[id].x+(Math.random()*32-16),y:pos[id].y+(Math.random()*32-16)});}
  if(upd.length){nodes.update(upd);network.startSimulation();}
},1500);
</script>
</body>
